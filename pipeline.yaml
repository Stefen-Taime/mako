# Mako Pipeline — Starter Template
# Docs: https://github.com/Stefen-Taime/mako
#
# This pipeline fetches commerce data from a public JSON API,
# applies transforms, and loads to PostgreSQL.
#
# Quick start:
#   mako validate pipeline.yaml
#   mako run pipeline.yaml
#
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: commerce-ingest
  description: "Ingest commerce data from open-source-data"
  owner: data-engineering

  source:
    type: http
    config:
      url: https://raw.githubusercontent.com/Stefen-Taime/open-source-data/main/commerce/json/json_bank_20240116_1.json
      method: GET
      auth_type: none
      response_type: json

  transforms:
    # Hash user_id for privacy
    - name: pii_mask
      type: hash_fields
      fields: [user_id]

    # Drop fields we don't need
    - name: cleanup
      type: drop_fields
      fields: [price_string, dt_current_timestamp]

    # Keep only items above $50
    - name: filter_price
      type: filter
      condition: "price > 50"

  sink:
    type: postgres
    database: mako
    schema: analytics
    table: commerce_events
    config:
      host: localhost
      port: "5432"
      user: mako
      password: mako

  monitoring:
    metrics:
      enabled: true
      port: 9090
